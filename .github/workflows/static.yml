# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Fix asset paths for subdirectory deployment
        run: |
          # When a custom domain is configured (CNAME file present), the site is served
          # from the domain root (/), so asset paths like /css/main.css are correct as-is.
          # GitHub Pages also automatically redirects the github.io/REPO/ URL to the
          # custom domain, so both URLs resolve correctly without any path rewriting.
          #
          # When no custom domain is configured, the site is served from a subdirectory
          # (e.g. /FARC/), so absolute paths must be prefixed with that base path.
          if [ -f "CNAME" ] && [ -s "CNAME" ]; then
            echo "Custom domain configured ($(cat CNAME)). Using root-relative asset paths — no rewriting needed."
          else
            BASE_PATH="${{ steps.pages.outputs.base_path }}"
            if [ -n "$BASE_PATH" ] && [ "$BASE_PATH" != "/" ]; then
              echo "Prefixing absolute paths with base path: $BASE_PATH"
              find . -name "*.html" -not -path "./.git/*" \
                -exec sed -i \
                  -e "s|href=\"/|href=\"${BASE_PATH}/|g" \
                  -e "s|src=\"/|src=\"${BASE_PATH}/|g" \
                  {} \;
            fi
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
